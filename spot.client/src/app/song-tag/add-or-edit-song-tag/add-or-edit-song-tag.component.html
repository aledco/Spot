<div class="page-header">
  <h2>{{songTag.id == null ? 'Add' : 'Edit'}} Tag</h2>
</div>
<div class="page-body">
  <p-progressSpinner ariaLabel="loaded" *ngIf="!loaded || busy" />
  <div class="row form-group" *ngIf="loaded">
    <div class="col-md-4">
      <label for="name">Name</label>
      <input pInputText id="name" [(ngModel)]="songTag.name" style="width: 400px;" />
    </div>
  </div>
  <div class="button-group">
    <p-button routerLink="/songtag/list" severity="secondary" [class.disabled]="busy">Back</p-button>
    <p-button type="submit" (click)="save()" [disabled]="busy">Save</p-button>
  </div>
</div>

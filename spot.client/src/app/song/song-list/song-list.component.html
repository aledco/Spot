<h2>Songs</h2>

<button (click)="sync()">Sync Songs From Playlists</button>

<div *ngIf="songs">
  <table>
    <tr>
      <th>Name</th>
      <th>Artist</th>
      <th>Tags</th>
    </tr>
    <tr *ngFor="let s of songs">
      <td>{{s.name}}</td>
      <td>{{s.artist}}</td>
      <td>TODO</td>
    </tr>
  </table>
</div>
